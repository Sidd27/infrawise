name: Create Draft Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  draft-release:
    name: Create Draft Release
    runs-on: ubuntu-latest

    steps:
      - name: Validate semver tag
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${{ github.ref_name }} is not a valid semver tag (expected vX.Y.Z)"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create draft release
        run: |
          gh release create "${{ github.ref_name }}" \
            --draft \
            --generate-notes \
            --notes "Publish this release to deploy to npm." \
            --title "Infrawise ${{ github.ref_name }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
