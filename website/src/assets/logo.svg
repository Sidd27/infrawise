<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1628"/>
      <stop offset="100%" stop-color="#04080e"/>
    </radialGradient>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="55%" stop-color="#3355ff"/>
      <stop offset="100%" stop-color="#8833ee"/>
    </linearGradient>
    <!-- diagonal gradient: dark blue bottom-left → purple top-right, matching image -->
    <linearGradient id="lg" x1="36" y1="130" x2="145" y2="73" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2255ee"/>
      <stop offset="60%" stop-color="#5544cc"/>
      <stop offset="100%" stop-color="#8844dd"/>
    </linearGradient>
    <filter id="fo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="fb" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="fl" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- Grid -->
  <g stroke="#1a3060" stroke-width="0.4" opacity="0.35">
    <line x1="0" y1="50" x2="200" y2="50"/><line x1="0" y1="100" x2="200" y2="100"/>
    <line x1="0" y1="150" x2="200" y2="150"/><line x1="50" y1="0" x2="50" y2="200"/>
    <line x1="100" y1="0" x2="100" y2="200"/><line x1="150" y1="0" x2="150" y2="200"/>
  </g>

  <!-- Outer glow blue -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56"
           fill="none" stroke="#0088ee" stroke-width="24" filter="url(#fo)" opacity="0.55"/>
  <!-- Outer glow purple -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56"
           fill="none" stroke="#7722cc" stroke-width="14" filter="url(#fo)" opacity="0.35"/>

  <!-- Hex dark fill -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56" fill="#060c18"/>

  <!-- Hex border glow -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56"
           fill="none" stroke="#00aaff" stroke-width="5" filter="url(#fb)" opacity="0.8"/>
  <!-- Hex border crisp -->
  <polygon points="100,12 176,56 176,144 100,188 24,144 24,56"
           fill="none" stroke="url(#hg)" stroke-width="2" opacity="0.95"/>

  <!-- Letter glow layer -->
  <g filter="url(#fb)" opacity="0.55">
    <!-- i -->
    <rect x="36" y="73" width="13" height="57" fill="#3366ff"/>
    <!-- w left piece: top(65,73)→(80,73), converges to point at (100,130), foot extends to (55,130) -->
    <polygon points="65,73 80,73 100,130 55,130" fill="#3366ff"/>
    <!-- w right piece: mirror -->
    <polygon points="120,73 135,73 145,130 100,130" fill="#3366ff"/>
  </g>

  <!-- Letters iw -->
  <!-- i: simple vertical bar -->
  <rect x="36" y="73" width="13" height="57" fill="url(#lg)"/>
  <!-- w: two trapezoid pieces meeting at bottom center point (100,130) -->
  <!-- left piece: outer top-left(65,73) → inner top-right(80,73) → center bottom(100,130) → outer foot(55,130) -->
  <polygon points="65,73 80,73 100,130 55,130" fill="url(#lg)"/>
  <!-- right piece: inner top-left(120,73) → outer top-right(135,73) → outer foot(145,130) → center bottom(100,130) -->
  <polygon points="120,73 135,73 145,130 100,130" fill="url(#lg)"/>
</svg>
