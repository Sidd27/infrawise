<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0c1628"/>
      <stop offset="100%" stop-color="#04080e"/>
    </radialGradient>
    <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ccff"/>
      <stop offset="55%" stop-color="#3355ff"/>
      <stop offset="100%" stop-color="#8833ee"/>
    </linearGradient>
    <linearGradient id="lg" x1="6" y1="21" x2="23" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2255ee"/>
      <stop offset="60%" stop-color="#5544cc"/>
      <stop offset="100%" stop-color="#8844dd"/>
    </linearGradient>
    <filter id="fo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
    <filter id="fb" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="0.7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="5" fill="url(#bg)"/>

  <!-- Outer glow -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
           fill="none" stroke="#0088ee" stroke-width="4" filter="url(#fo)" opacity="0.55"/>
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
           fill="none" stroke="#7722cc" stroke-width="2" filter="url(#fo)" opacity="0.35"/>

  <!-- Hex dark fill -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="#060c18"/>

  <!-- Hex border -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
           fill="none" stroke="#00aaff" stroke-width="1" filter="url(#fb)" opacity="0.8"/>
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9"
           fill="none" stroke="url(#hg)" stroke-width="0.7" opacity="0.95"/>

  <!-- Letters iw -->
  <!-- i -->
  <rect x="6" y="12" width="2" height="9" fill="url(#lg)"/>
  <!-- w left piece -->
  <polygon points="10,12 13,12 16,21 9,21" fill="url(#lg)"/>
  <!-- w right piece -->
  <polygon points="19,12 22,12 23,21 16,21" fill="url(#lg)"/>
</svg>
